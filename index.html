<script>
function renderLegendaHover(idx = null) {
  const legend = document.getElementById('cat2-legend');
  if (!legend) return;

  const catAtiva = document.getElementById('d2-cat').value;

  const sorted = [...cats].sort((a,b) => totCatMap[b]-totCatMap[a]);

  legend.innerHTML = sorted.map((c) => {
    const cor = PALETTE[cats.indexOf(c) % PALETTE.length];

    let valor;

    if (idx !== null && seriesMap[c] && seriesMap[c][idx] !== undefined) {
      valor = seriesMap[c][idx];
    } else {
      valor = totCatMap[c];
    }

    const ativa = catAtiva === c;

    return `
      <div onclick="d2SetCatDropdown('${c.replace(/'/g,"\\'")}')"
        style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:6px 10px;border-radius:8px;
        background:${ativa ? 'rgba(200,241,53,0.08)' : 'transparent'};
        border:1px solid ${ativa ? 'rgba(200,241,53,0.3)' : 'transparent'};">

        <div style="width:8px;height:8px;border-radius:50%;background:${cor};"></div>

        <span style="font-size:0.75rem;color:${ativa ? '#c8f135' : '#8891aa'};">
          ${c}
        </span>

        <span style="font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--accent2);">
          ${Number(valor || 0).toLocaleString('pt-BR')}
        </span>
      </div>
    `;
  }).join('');
}
</script>
